apiVersion: infra.k8smgmt.io/v3
kind: Cluster
metadata:
  name: simha-rctl
  project: defaultproject
spec:
  blueprint:
    name: default
    version: latest
  config:
    autoApproveNodes: true
    kubernetesVersion: v1.34.1
    location: sanjose-us
    network:
      cni:
        name: Calico
        version: 3.26.1
      podSubnet: 10.244.0.0/16
      serviceSubnet: 10.96.0.0/12
    nodes:
    - arch: amd64
      hostname: simha-mks
      operatingSystem: Ubuntu24.04
      privateIP: 10.0.1.244
      roles:
      - ControlPlane
      - Worker
      ssh:
        ipAddress: 161.153.47.168
        port: "22"
        privateKeyPath: /Users/vijay/Downloads/oci-abi-key.key
        username: ubuntu
  type: mks
