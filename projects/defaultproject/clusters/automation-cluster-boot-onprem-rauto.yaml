apiVersion: infra.k8smgmt.io/v3
kind: Cluster
metadata:
  name: automation-cluster-boot-onprem-rauto
  project: defaultproject
spec:
  blueprint:
    name: default
  config:
    autoApproveNodes: true
    installerTtl: 365
    kubernetesVersion: v1.33.5
    network:
      cni:
        name: Calico
        version: 3.28.1
      podSubnet: 10.244.0.0/16
      serviceSubnet: 10.96.0.0/12
    nodes:
    - arch: amd64
      hostname: rauto-sdk-mks
      operatingSystem: Ubuntu22.04
      privateIP: 10.0.0.236
      roles:
      - Worker
      - ControlPlane
    platformVersion: v1.1.0
  proxy: {}
  sharing:
    enabled: true
    projects:
    - name: rauto-infra-test-project
    - name: rauto-platform-test-project
    - {}
    - name: rbac-project-421539286
  type: mks
